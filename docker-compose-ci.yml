services:
  postgres_srv:
    image: postgres:16-alpine
    container_name: booking_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-booking_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - booking_network

  redis:
    image: redis:7-alpine
    container_name: booking_cache
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - booking_network

  backend:
    image: booking_api_image:latest
    container_name: booking_backend
    restart: unless-stopped
    depends_on:
      postgres_srv:
        condition: service_healthy
    environment:
      DB_HOST: booking_db
      REDIS_HOST: booking_cache
    networks:
      - booking_network
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL and Redis to be ready...' &&
        sleep 10 &&
        alembic upgrade head &&
        python src/main.py
      "

  celery_worker:
    image: booking_api_image:latest
    container_name: booking_celery_worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./src:/app/src
    networks:
      - booking_network
    command: ["celery", "--app=src.tasks.celery_app:celery_app", "worker", "-l", "INFO"]

  celery_beat:
    image: booking_api_image:latest
    container_name: booking_celery_beat
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./src:/app/src
    networks:
      - booking_network
    command: ["celery", "--app=src.tasks.celery_app:celery_app", "beat", "-l", "INFO"]

  nginx:
    build:
      context: .
      dockerfile: Dickerfilenginx
    container_name: booking_nginx
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - booking_network

volumes:
  postgres_data:
  redis_data:

networks:
  booking_network:
    driver: bridge