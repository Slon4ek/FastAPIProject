services:
  booking_back_service:
    container_name: booking_back
    build:
      context: .
    networks:
      - myNetwork
    env_file:
      - .env
    ports:
      - "8888:8000"

  booking_celery_worker_service:
    container_name: booking_celery_worker
    build:
      context: .
    networks:
      - myNetwork
    env_file:
      - .env
    command: ["celery", "--app=src.tasks.celery_app:celery_app", "worker", "-l", "INFO"]

  booking_celery_beat_service:
    container_name: booking_celery_beat
    build:
      context: .
    networks:
      - myNetwork
    env_file:
      - .env
    command: ["celery", "--app=src.tasks.celery_app:celery_app", "beat", "-l", "INFO"]

networks:
  myNetwork:
    external: true