events {}

http {
    server {
        listen 80;
        server_name my-booking-project.ru;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name my-booking-project.ru;

        location / {
            proxy_pass http://booking_backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        ssl_certificate /etc/letsencrypt/live/my-booking-project.ru/fullchain.pem;

        ssl_certificate_key /etc/letsencrypt/live/my-booking-project.ru/privkey.pem;

        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    }
}
